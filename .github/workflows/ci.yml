name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: queueflow
          POSTGRES_PASSWORD: queueflow
          POSTGRES_DB: queueflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://queueflow:queueflow@localhost:5432/queueflow
      QUEUEFLOW_STORE: postgres

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Postgres client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U queueflow; do
            echo "Waiting for Postgres..."
            sleep 1
          done

      - name: Run migrations
        run: npm run db:migrate

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Smoke test
        run: npm run test:smoke
